[options]
addons_path = /odoo/odoo/addons,/odoo/addons,/mnt/jorels-addons,/mnt/custom-addons
; DB connection (db_host/port/user/password) is supplied at runtime by the
; entrypoint as CLI args — intentionally not set here.
log_level = info
; Production settings
list_db = False
proxy_mode = True
without_demo = True
data_dir = /var/lib/odoo
; Bind on IPv6 (also accepts IPv4-mapped on Linux) — platform internal meshes
; (Railway, Fly 6PN) route over IPv6, so an IPv4-only bind is unreachable for
; healthchecks and inter-service traffic.
http_interface = ::
; Worker processes (HTTP + cron). Override at runtime with WORKERS env (see entrypoint).
workers = 4
