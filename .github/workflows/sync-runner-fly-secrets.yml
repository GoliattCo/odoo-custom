# sync-runner-fly-secrets
#
# One-shot operator workflow that pushes the Postgres-ssh-scoped Fly
# token (stored in GH as `FLY_SSH_TOKEN_POSTGRES`) onto the
# odoo-saas-migration-runner Fly app as `FLY_API_TOKEN`.
#
# Why: rollback.py's data-restore path SSH-delegates to the Postgres
# machine via `flyctl ssh console --app odoo-saas-postgres --command
# "..."`. flyctl reads FLY_API_TOKEN from env, and the migration-
# runner's normal deploy token is migration-runner-scoped — it CAN'T
# ssh into postgres. So the runner's FLY_API_TOKEN env needs to BE
# the postgres-ssh token (different from the deploy token used by
# CI).
#
# Also stages SNAPSHOT_MODE=ssh and PGBACKREST_DRY_RUN to the runner
# in the same call (one operator step instead of three).
#
# Trigger manually. Re-runs are idempotent (flyctl secrets set is
# idempotent and --stage defers the restart until next deploy).

name: sync-runner-fly-secrets

on:
  workflow_dispatch:
    inputs:
      dry_run_pgbackrest:
        description: 'PGBACKREST_DRY_RUN: stage true (safe) or false (real restore)'
        required: true
        default: 'true'
        type: choice
        options: ['true', 'false']

concurrency:
  group: sync-runner-fly-secrets
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  sync:
    name: Stage FLY_API_TOKEN + SNAPSHOT_MODE on migration-runner
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Stage secrets on odoo-saas-migration-runner
        env:
          # Token with admin/deploy on migration-runner — needed to
          # call `flyctl secrets set` against that app.
          FLY_API_TOKEN: ${{ secrets.FLY_MIGRATION_RUNNER_TOKEN }}
          # The value we want to PUSH onto migration-runner — a token
          # with ssh permission on odoo-saas-postgres so rollback.py
          # can flyctl-ssh into it.
          POSTGRES_SSH_TOKEN: ${{ secrets.FLY_SSH_TOKEN_POSTGRES }}
          DRY_RUN_PGBACKREST: ${{ inputs.dry_run_pgbackrest }}
        run: |
          set -euo pipefail
          if [ -z "${POSTGRES_SSH_TOKEN:-}" ]; then
              echo "::error::FLY_SSH_TOKEN_POSTGRES secret is not set on the repo" >&2
              exit 1
          fi
          # --stage defers the rolling restart to the next deploy.
          # The next migration-runner image rebuild + deploy picks
          # them up.
          flyctl secrets set --stage --app odoo-saas-migration-runner \
              FLY_API_TOKEN="$POSTGRES_SSH_TOKEN" \
              SNAPSHOT_MODE=ssh \
              PGBACKREST_DRY_RUN="$DRY_RUN_PGBACKREST"
          {
            echo "## Staged on odoo-saas-migration-runner"
            echo ""
            echo "| Var | Source | Value |"
            echo "|---|---|---|"
            echo "| FLY_API_TOKEN | GH secret \`FLY_SSH_TOKEN_POSTGRES\` | (redacted) |"
            echo "| SNAPSHOT_MODE | literal | \`ssh\` |"
            echo "| PGBACKREST_DRY_RUN | input | \`$DRY_RUN_PGBACKREST\` |"
            echo ""
            echo "Next: deploy the runner to activate."
          } >> "$GITHUB_STEP_SUMMARY"
