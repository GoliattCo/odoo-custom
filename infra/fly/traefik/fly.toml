# Fly.io app descriptor for Traefik v3 as the public edge.
#
# Deploy:
#   flyctl deploy --config infra/fly/traefik/fly.toml --remote-only
#
# Required secrets (set with `flyctl secrets set --app odoo-saas-traefik …`):
#   CLOUDFLARE_DNS_API_TOKEN  — for the DNS-01 ACME challenge on
#                                *.app.goliatt.co (or whichever tenant root
#                                you pick for the Fly leg)
#
# Phase 1 minimal Traefik: file provider only (the redis-backed dynamic
# routes don't matter until tenants actually provision on Fly). Redis +
# REDIS_USERNAME/REDIS_PASSWORD secrets come back when we wire dynamic
# per-tenant routes — for now Traefik routes everything via the baked
# dynamic.yml from the image.
#
# Critical: this app does NOT use Fly's [http_service] (which would have
# Fly's proxy terminate TLS before Traefik sees the packet). Traefik does
# its OWN TLS + ACME, so we use raw [[services]] with TCP handlers on 80
# and 443 — Fly forwards bytes through; Traefik handles handshake.

app            = "odoo-saas-traefik"
primary_region = "iad"
kill_signal    = "SIGINT"
kill_timeout   = "10s"

[build]
  dockerfile = "../../traefik/Dockerfile"

[env]
  TRAEFIK_LOG_LEVEL = "INFO"
  # Override the static config's "redis:6379" placeholder. Reset to a real
  # endpoint when we add a Fly Redis app and start writing dynamic routes.
  # For Phase 1 file-provider-only we just point at a noop loopback to keep
  # the redis provider from spamming connect errors at startup. Traefik
  # gracefully degrades to the file provider when redis is unreachable.
  TRAEFIK_PROVIDERS_REDIS_ENDPOINTS = "[::1]:6379"

# Public TCP on 443 — Traefik does its own TLS termination via the
# cloudflare cert resolver. handlers = [] means raw TCP passthrough.
[[services]]
  internal_port       = 443
  protocol            = "tcp"
  auto_start_machines = true
  auto_stop_machines  = false
  min_machines_running = 1

  [[services.ports]]
    port     = 443
    handlers = []   # Fly forwards raw bytes; Traefik does TLS.

  [[services.tcp_checks]]
    interval     = "10s"
    timeout      = "2s"
    grace_period = "60s"

# Public TCP on 80 — Traefik handles the HTTP→HTTPS redirect itself
# (see entryPoints.web.http.redirections in infra/traefik/traefik.yml).
[[services]]
  internal_port       = 80
  protocol            = "tcp"
  auto_start_machines = true
  auto_stop_machines  = false
  min_machines_running = 1

  [[services.ports]]
    port     = 80
    handlers = ["http"]

  [[services.tcp_checks]]
    interval     = "10s"
    timeout      = "2s"
    grace_period = "60s"

[[mounts]]
  source      = "traefik_letsencrypt"
  destination = "/letsencrypt"

[[vm]]
  size   = "shared-cpu-1x"
  memory = "512mb"
