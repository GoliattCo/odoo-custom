# Fly.io app descriptor for the shared Odoo pool.
#
# Deploy with:
#   fly deploy --config infra/fly/odoo/fly.toml --dockerfile Dockerfile --remote-only
#
# Secrets (set with `fly secrets set --app odoo-saas-odoo KEY=VALUE`):
#   ADMIN_PASSWORD             — Odoo master password (entrypoint required)
#   PGHOST, PGPORT, PGUSER     — connection details for the Postgres app
#   PGPASSWORD                 — Postgres superuser password
#
# Note on process groups: the plan calls for `web` / `cron` / `live` split
# for HTTP, scheduled jobs, and websocket workers. Phase 1 keeps a single
# process group ("web") to validate the build path; the cron and live split
# lands when Odoo's `--workers` and `--longpolling-port` are wired through
# env vars in the entrypoint (TODO Phase 2).

app            = "odoo-saas-odoo"
primary_region = "iad"
kill_signal    = "SIGINT"
kill_timeout   = "30s"

[build]
  dockerfile = "../../../Dockerfile"

[env]
  PLATFORM = "fly"
  # PORT picked up from Fly's automatic env injection (Fly Proxy binds 8080
  # by default but our entrypoint defaults to 8069 — keep explicit).
  PORT = "8069"

[http_service]
  internal_port       = 8069
  # Phase 1 minimal Fly: Odoo sits behind Fly's edge directly (no Traefik yet),
  # so let Fly terminate TLS + redirect HTTP→HTTPS. When Traefik comes back as
  # the edge (Phase 2), flip back to false and route through the Traefik app.
  force_https         = true
  auto_start_machines = true
  auto_stop_machines  = false
  min_machines_running = 1

  [[http_service.checks]]
    interval     = "15s"
    timeout      = "5s"
    grace_period = "60s"
    method       = "GET"
    # /web/health is DB-less and always 200. /saas/health (from saas_tenant_gate)
    # would 404 here because dbfilter resolves a hostname to a tenant DB, and
    # there's no tenant DB for Fly's internal healthcheck hostname.
    path         = "/web/health"

[[mounts]]
  source      = "odoo_data"
  destination = "/var/lib/odoo"
  # Phase 1: filestore + sessions live here. Phase 2 (exclusive tier) carves
  # per-tenant subdirs; the wildcard chown in the entrypoint stays compatible.

[[vm]]
  size   = "shared-cpu-2x"
  memory = "2gb"
