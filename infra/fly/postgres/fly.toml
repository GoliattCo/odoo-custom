# Fly.io app descriptor for the self-managed Postgres service.
#
# Deploy with:
#   fly deploy --config infra/fly/postgres/fly.toml --dockerfile infra/postgres/Dockerfile
#
# This is NOT Fly Postgres (the legacy managed add-on). It's a normal Fly app
# running our own Postgres image, mounted on a Fly Volume.
#
# Secrets (set with `fly secrets set --app odoo-saas-postgres KEY=VALUE`):
#   POSTGRES_PASSWORD
#   PGBACKREST_REPO1_S3_BUCKET
#   PGBACKREST_REPO1_S3_REGION
#   PGBACKREST_REPO1_S3_KEY
#   PGBACKREST_REPO1_S3_KEY_SECRET
#   PGBACKREST_REPO1_CIPHER_PASS

app            = "odoo-saas-postgres"
primary_region = "iad"           # Phase 1 single-region. Phase 5 adds GRU/SCL.
kill_signal    = "SIGINT"
kill_timeout   = "30s"

[build]
  dockerfile = "../../postgres/Dockerfile"

[env]
  PGDATA = "/var/lib/postgresql/data/pgdata"

# Postgres listens on 5432 over 6PN (Fly's IPv6 internal mesh). No public TCP —
# Odoo and Traefik reach Postgres via `odoo-saas-postgres.internal:5432`. We do
# NOT declare a [[services]] block here: that's for Fly's public proxy, and an
# internal-only service doesn't need it. Peers resolve `.internal` DNS directly
# to the machine's 6PN address.

[[mounts]]
  source      = "pgdata"
  destination = "/var/lib/postgresql/data"
  # Fly Volumes are zone-pinned within a region. HA = streaming replica in a
  # second region (Phase 2+), not volume forking.

# Container-level TCP healthcheck on the postgres port.
[checks]
  [checks.pg_tcp]
    type         = "tcp"
    port         = 5432
    interval     = "15s"
    timeout      = "2s"
    grace_period = "30s"

[[vm]]
  size   = "shared-cpu-2x"
  memory = "4gb"
