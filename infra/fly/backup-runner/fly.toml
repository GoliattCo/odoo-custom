# Fly.io app descriptor for the backup runner.
#
# Deploy:
#   flyctl deploy --config infra/fly/backup-runner/fly.toml --remote-only
#
# Required secrets (set with `flyctl secrets set --app odoo-saas-backup-runner …`):
#   BACKUP_RUNNER_TOKEN    long random shared secret; same value set as
#                          BACKUP_RUNNER_TOKEN on the Vercel admin project
#                          (so the WDK runRemoteBackup step can authenticate).
#   PGHOST                 odoo-saas-postgres.internal
#   PGPORT                 5432
#   PGUSER                 postgres   (superuser for pg_dump)
#   PGPASSWORD             same value as POSTGRES_PASSWORD on the postgres app
#   AWS_REGION             us-east-1
#   AWS_ACCESS_KEY_ID      pgbackrest-fly access key id
#   AWS_SECRET_ACCESS_KEY  pgbackrest-fly secret access key
#
# Phase 1 scope: pg_dump only. Filestore backup happens INSIDE the Odoo
# container via the `saas_filestore_backup` custom addon (data-plane addon
# auto-installed with saas_tenant_gate); Fly volumes are single-app so this
# runner can't mount the Odoo filestore directly, and we don't try to.
# Filestore-mount field is therefore omitted vs the original scaffold.

app            = "odoo-saas-backup-runner"
primary_region = "iad"
kill_signal    = "SIGINT"
kill_timeout   = "60s"   # let an in-flight pg_dump finish on rolling deploy

[build]
  dockerfile = "../../backup-runner/Dockerfile"

[env]
  PORT = "8080"
  # No FILESTORE_BASE because there's no filestore mount — pg_dump-only.

# Internal-only HTTP service. The control plane reaches this via 6PN
# (`odoo-saas-backup-runner.internal:8080`); never publicly exposed because
# BACKUP_RUNNER_TOKEN alone shouldn't gate the pg_dump capability.
[http_service]
  internal_port       = 8080
  force_https         = false   # 6PN-internal only; no TLS needed
  auto_start_machines = true
  auto_stop_machines  = false
  min_machines_running = 1

  [[http_service.checks]]
    interval     = "15s"
    timeout      = "5s"
    grace_period = "60s"
    method       = "GET"
    path         = "/health"

[[vm]]
  size   = "shared-cpu-2x"
  memory = "2gb"
