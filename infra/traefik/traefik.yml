# Traefik v3 static configuration — Odoo SaaS edge router.
#
# Same file deploys to Railway and Fly. Tenant routing logic is identical on
# both platforms; we chose Traefik over Fly Proxy / Railway edge specifically
# to keep this surface platform-agnostic.
#
# Dynamic source of truth in production: Redis KV. The WDK provisionTenant
# workflow's `registerRoute` step writes `<slug>.app.goliatt.co →
# odoo-pool:8069` entries with `X-Odoo-Database: <slug>` header injection.
# The fallback dynamic.yml file ships baseline middlewares + the IP-allowlist
# rule for /web/database/*.

global:
  checkNewVersion: false
  sendAnonymousUsage: false

log:
  level: INFO
  format: json

accessLog:
  format: json
  fields:
    headers:
      defaultMode: keep
      names:
        Authorization: drop
        Cookie: drop
        X-Odoo-Database: keep

api:
  dashboard: true
  insecure: false
  # Dashboard is exposed only on the internal entrypoint; never reachable
  # from public HTTPS.

entryPoints:
  web:
    address: ":80"
    http:
      redirections:
        entryPoint:
          to: websecure
          scheme: https
          permanent: true
  websecure:
    address: ":443"
    http:
      tls:
        certResolver: cloudflare
  internal:
    address: ":8080"
    # Traefik dashboard + metrics. Bound to platform-internal network only;
    # neither Railway nor Fly should expose 8080 publicly.

providers:
  file:
    filename: /etc/traefik/dynamic.yml
    watch: true
  redis:
    # Fly's odoo-saas-redis app over 6PN. Traefik's env-var override for
    # `[]string` slices doesn't work reliably across v3.x — see the WORKED-
    # AROUND `TRAEFIK_PROVIDERS_REDIS_ENDPOINTS` env that gets ignored when
    # this YAML value is present — so we bake the hostname here. Railway
    # doesn't run a Traefik service today; this string only matters for the
    # Fly Traefik. Override at deploy time via a custom CMD if you ever
    # repurpose the image for a non-Fly platform.
    endpoints:
      - "odoo-saas-redis.internal:6379"
    rootKey: "traefik"
    # Username + password are set per-environment via the env-var override:
    #   TRAEFIK_PROVIDERS_REDIS_USERNAME   default
    #   TRAEFIK_PROVIDERS_REDIS_PASSWORD   <Fly secret>
    # Scalar fields override fine; only slice fields (like `endpoints`) are
    # the env-override issue we hit.

certificatesResolvers:
  cloudflare:
    acme:
      email: ops@goliatt.co
      storage: /letsencrypt/acme.json
      dnsChallenge:
        provider: cloudflare
        delayBeforeCheck: 0
        resolvers:
          - "1.1.1.1:53"
          - "1.0.0.1:53"

metrics:
  prometheus:
    entryPoint: internal
    addEntryPointsLabels: true
    addServicesLabels: true
